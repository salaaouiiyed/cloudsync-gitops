# =============================================================================
# SERVICE KEYCLOAK - Version corrigée pour Application Gateway
# =============================================================================
# Problème initial: Le service écoutait sur le port 8080, mais l'Application
# Gateway (configurée en Terraform) envoie tout le trafic sur le port 80.
#
# Solution: Le service écoute maintenant sur le port 80 (pour l'App Gateway)
# et redirige vers le port 8080 du container Keycloak (targetPort).
#
# Cela permet de:
#   1. Rester compatible avec la configuration Terraform (port 80)
#   2. Ne pas modifier l'image Keycloak qui écoute nativement sur 8080
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: keycloak-service
  namespace: default                     # À adapter si besoin
  labels:
    app: keycloak
    component: authentication
    part-of: cloudsync
  annotations:
    # Annotation optionnelle pour forcer le port 80 dans AGIC
    service.beta.kubernetes.io/azure-load-balancer-internal: "false"
spec:
  selector:
    app: keycloak                        # Doit correspondre aux labels du deployment
  ports:
    - name: http
      protocol: TCP
      port: 80                           # ← PORT POUR L'APP GATEWAY (corrigé)
      targetPort: 8080                   # ← PORT DU CONTAINER (inchangé)
  type: ClusterIP                        # Exposition interne au cluster uniquement
